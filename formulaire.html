<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <h2>Formulaire d'inscription</h2>
        <label>Nom :</label>
        <input type="nom" placeholder="Votre nom" required>
        <label>Prénom :</label>
        <input type="prenom" placeholder="Votre prénom" required> <br>
        <label>Email :</label>
        <input type="email" placeholder="exemple@gmail.com" required>
        <label>Mot de passe :</label>
        <input type="password" required>
        <label>Pays :</label>
        <select>
            <option>Maroc</option>
            <option>France</option>
            <option>Canada</option>
        </select>
        <label>Centres d’intérêt :</label><br>
        <input type="checkbox"> IA
        <input type="checkbox"> Web
        <input type="checkbox"> Réseaux <br>
        <label>Genre :</label><br>
        <input type="radio" name="genre"> Homme
        <input type="radio" name="genre"> Femme <br>
        <label>Commentaire :</label><br>
        <textarea rows="4"></textarea>
        <label>Couleur préférée :</label>
        <input type="color">
        <br><br>
        <button type="submit">Envoyer</button>
        <button type="reset">Effacer</button>

    </form>
