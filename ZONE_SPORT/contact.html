<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZoneSport - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>ZoneSport</h1>
        <p>Votre boutique de sport en ligne</p>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">Accueil</a></li>
            <li><a href="produits.html">produits</a></li>
            <li><a href="contact.html">contact</a></li>
        </ul>
    </nav> 
    <div class="container">

        <h2>Envoyez-nous un message</h2>

        <form action="#">
            
            <div>
                <label for="name">Nom complet :</label><br>
                <input type="text" id="name" name="name" placeholder="Entrez votre nom complet" required>
            </div>
            <br>

            <div>
                <label for="email">Adresse email :</label><br>
                <input type="email" id="email" name="email" placeholder="Entrez votre adresse email" required>
            </div>
            <br>

            <div>
                <label for="message">Message :</label><br>
                <textarea id="message" name="message" rows="6" placeholder="Tapez votre message ici..." required></textarea>
            </div>
            <br>

            <div>
                <button type="submit">Envoyer</button>
                <button type="reset">Annuler</button>
            </div>

        </form>
        </div> 
 <footer> © 2026 ZoneSport. Tous droits réservés </footer>   
</body>
</html>
